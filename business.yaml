// src/components/ServiceForm.js

import React, { useState } from 'react';
import axios from 'axios';

const ServiceForm = ({ service, onSubmit }) => {
  const [name, setName] = useState(service ? service.name : '');
  const [description, setDescription] = useState(service ? service.description : '');
  const [price, setPrice] = useState(service ? service.price : '');
  const [duration, setDuration] = useState(service ? service.duration : '');

  const handleSubmit = (e) => {
    e.preventDefault();
    const serviceData = { name, description, price, duration };

    // Determine whether to add or update a service
    if (service) {
      // Update service
      axios.put(`/market/services/${service.id}`, serviceData)
        .then(response => {
          onSubmit();
        })
        .catch(error => console.error('There was an error updating the service!', error));
    } else {
      // Add new service
      axios.post('/market/services', serviceData)
        .then(response => {
          onSubmit();
        })
        .catch(error => console.error('There was an error adding the service!', error));
    }
  };

  return (
    <form onSubmit={handleSubmit}>
      <h3>{service ? 'Update Service' : 'Add Service'}</h3>
      <label>Name:</label>
      <input type="text" value={name} onChange={(e) => setName(e.target.value)} required />

      <label>Description:</label>
      <textarea value={description} onChange={(e) => setDescription(e.target.value)} />

      <label>Price:</label>
      <input type="number" value={price} onChange={(e) => setPrice(e.target.value)} required />

      <label>Duration (Minutes):</label>
      <input type="number" value={duration} onChange={(e) => setDuration(e.target.value)} required />

      <button type="submit">{service ? 'Update' : 'Add'}</button>
    </form>
  );
};

export default ServiceForm;
