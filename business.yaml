Copy code
from app import db
from datetime import datetime

# Product Model
class Product(db.Model):
    id = db.Column(db.Integer, primary_key=True)
    name = db.Column(db.String(255), nullable=False)
    description = db.Column(db.String(255), nullable=True)
    price = db.Column(db.Float, nullable=False)
    quantity = db.Column(db.Integer, default=0)  # Stock quantity
    created_at = db.Column(db.DateTime, default=datetime.utcnow)
    updated_at = db.Column(db.DateTime, default=datetime.utcnow, onupdate=datetime.utcnow)

    def __repr__(self):
        return f'<Product {self.name}>'

# Service Model
class Service(db.Model):
    id = db.Column(db.Integer, primary_key=True)
    name = db.Column(db.String(255), nullable=False)
    description = db.Column(db.String(255), nullable=True)
    price = db.Column(db.Float, nullable=False)
    duration = db.Column(db.Integer, nullable=False)  # Service duration in minutes
    created_at = db.Column(db.DateTime, default=datetime.utcnow)
    updated_at = db.Column(db.DateTime, default=datetime.utcnow, onupdate=datetime.utcnow)

    def __repr__(self):
        return f'<Service {self.name}>'
Explanation of Fields
Product Model:

name: Name of the product.
description: A short description of the product (optional).
price: The sale price of the product.
quantity: The quantity available in stock.
created_at: Timestamp when the product was created.
updated_at: Timestamp when the product was last updated.
Service Model:

name: Name of the service.
description: A brief description of the service (optional).
price: The price of the service.
duration: The duration of the service in minutes (e.g., a haircut could take 30 minutes).
created_at: Timestamp when the service was created.
updated_at: Timestamp when the service was last updated.
