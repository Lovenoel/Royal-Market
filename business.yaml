// src/components/ProductForm.js

import React, { useState } from 'react';
import axios from 'axios';

const ProductForm = ({ product, onSubmit }) => {
  const [name, setName] = useState(product ? product.name : '');
  const [description, setDescription] = useState(product ? product.description : '');
  const [price, setPrice] = useState(product ? product.price : '');
  const [quantity, setQuantity] = useState(product ? product.quantity : '');

  const handleSubmit = (e) => {
    e.preventDefault();
    const productData = { name, description, price, quantity };

    // Determine whether to add or update a product
    if (product) {
      // Update product
      axios.put(`/market/products/${product.id}`, productData)
        .then(response => {
          onSubmit();
        })
        .catch(error => console.error('There was an error updating the product!', error));
    } else {
      // Add new product
      axios.post('/market/products', productData)
        .then(response => {
          onSubmit();
        })
        .catch(error => console.error('There was an error adding the product!', error));
    }
  };

  return (
    <form onSubmit={handleSubmit}>
      <h3>{product ? 'Update Product' : 'Add Product'}</h3>
      <label>Name:</label>
      <input type="text" value={name} onChange={(e) => setName(e.target.value)} required />

      <label>Description:</label>
      <textarea value={description} onChange={(e) => setDescription(e.target.value)} />

      <label>Price:</label>
      <input type="number" value={price} onChange={(e) => setPrice(e.target.value)} required />

      <label>Quantity:</label>
      <input type="number" value={quantity} onChange={(e) => setQuantity(e.target.value)} required />

      <button type="submit">{product ? 'Update' : 'Add'}</button>
