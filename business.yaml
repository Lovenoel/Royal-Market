from flask import Blueprint, request, jsonify
from app.models import Product, Service, db

product_service_bp = Blueprint('product_service', __name__)

# CRUD for Products

@product_service_bp.route('/products', methods=['POST'])
def add_product():
    data = request.json
    new_product = Product(
        name=data['name'],
        description=data.get('description', ''),
        price=data['price'],
        quantity=data['quantity']
    )
    db.session.add(new_product)
    db.session.commit()
    return jsonify({"message": "Product added successfully"}), 201

@product_service_bp.route('/products/<int:id>', methods=['PUT'])
def update_product(id):
    data = request.json
    product = Product.query.get_or_404(id)
    product.name = data['name']
    product.description = data.get('description', product.description)
    product.price = data['price']
    product.quantity = data['quantity']
    db.session.commit()
    return jsonify({"message": "Product updated successfully"}), 200

@product_service_bp.route('/products/<int:id>', methods=['DELETE'])
def delete_product(id):
    product = Product.query.get_or_404(id)
    db.session.delete(product)
    db.session.commit()
    return jsonify({"message": "Product deleted successfully"}), 200

@product_service_bp.route('/products', methods=['GET'])
def get_products():
    products = Product.query.all()
    return jsonify([{
        'id': product.id,
        'name': product.name,
        'description': product.description,
        'price': product.price,
        'quantity': product.quantity,
        'created_at': product.created_at,
        'updated_at': product.updated_at
    } for product in products]), 200

# CRUD for Services

@product_service_bp.route('/services', methods=['POST'])
def add_service():
    data = request.json
    new_service = Service(
        name=data['name'],
        description=data.get('description', ''),
        price=data['price'],
        duration=data['duration']
    )
    db.session.add(new_service)
    db.session.commit()
    return jsonify({"message": "Service added successfully"}), 201

@product_service_bp.route('/services/<int:id>', methods=['PUT'])
def update_service(id):
    data = request.json
    service = Service.query.get_or_404(id)
    service.name = data['name']
    service.description = data.get('description', service.description)
    service.price = data['price']
    service.duration = data['duration']
    db.session.commit()
    return jsonify({"message": "Service updated successfully"}), 200

@product_service_bp.route('/services/<int:id>', methods=['DELETE'])
def delete_service(id):
    service = Service.query.get_or_404(id)
    db.session.delete(service)
    db.session.commit()
    return jsonify({"message": "Service deleted successfully"}), 200

@product_service_bp.route('/services', methods=['GET'])
def get_services():
    services = Service.query.all()
    return jsonify([{
        'id': service.id,
        'name': service.name,
        'description': service.description,
        'price': service.price,
        'duration': service.duration,
        'created_at': service.created_at,
        'updated_at': service.updated_at
    } for service in services]), 200
Explanation of Routes
Add Product/Service (POST /products, POST /services):
Allows you to create a new product or service.
Update Product/Service (PUT /products/<id>, PUT /services/<id>):
Allows you to update the product or service details.
Delete Product/Service (DELETE /products/<id>, DELETE /services/<id>):
Allows you to delete a product or service by its ID.
Get Products/Services (GET /products, GET /services):
