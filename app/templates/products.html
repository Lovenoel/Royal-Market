{% extends "base.html" %}
{% block content %}
<h2>Products for {{ business.name }}</h2>
<table>
    <thead>
        <tr>
            <th>Product Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for product in products %}
        <tr>
            <td>{{ product.name }}</td>
            <td>${{ product.price }}</td>
            <td>{{ product.stock }}</td>
            <td>
                <a href="{{ url_for('product.update', product_id=product.id) }}">Edit</a>
                <form action="{{ url_for('product.delete', product_id=product.id) }}" method="POST" style="display:inline;">
                    {{ form.hidden_tag() }}
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('product.create', business_id=business.id) }}" class="btn">Add New Product</a>
{% endblock %}
