{% extends 'base.html' %}
{% block head %}{% endblock head %}
{% block content %}
<div>
    <h1>Articles</h1>
    <table>
        <thead>
        <tr>
            <th>Title</th>
            <th>Content</th>
            <th>Created At</th>
        </tr>
        </thead>
        <tbody>
        {% for article in articles %}
            <tr>
            <td>{{ article.title }}</td>
            <td>{{ article.content }}</td>
            <td>{{ article.created_at }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock content %}
