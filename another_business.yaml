    analytics_accepted = request.cookies.get('analytics', 'false') == 'true'
    personalization_accepted = request.cookies.get('personalization', 'false') == 'true'

    # Track analytics if accepted
    if analytics_accepted:
        # Include tracking code or log analytics data
        print("Analytics tracking enabled.")

    # Apply personalization if accepted
    if personalization_accepted:
        # Adjust user experience, e.g., personalized greetings
        print("Personalization enabled.")
    
    return render_template('index.html', cookie_accepted=cookie_accepted, analytics_accepted=analytics_accepted, personalization_accepted=personalization_accepted)


@app.route('/set-cookie', methods=['POST'])
def set_cookie_preferences():
    """Route to accept or reject cookie preferences."""
    accept_essential = request.form.get('essential', 'false') == 'true'
    accept_analytics = request.form.get('analytics', 'false') == 'true'
    accept_personalization = request.form.get('personalization', 'false') == 'true'
    
    resp = make_response(jsonify({'message': 'Cookie preferences updated successfully'}))

    # Set essential cookies for 30 days
    if accept_essential:
        resp.set_cookie('cookie_accepted', 'true', max_age=timedelta(days=30), secure=True, httponly=True, samesite='Strict')

    # Set analytics cookies if user opted-in
    if accept_analytics:
        resp.set_cookie('analytics', 'true', max_age=timedelta(days=30), secure=True, httponly=True, samesite='Strict')

    # Set personalization cookies if user opted-in
    if accept_personalization:
        resp.set_cookie('personalization', 'true', max_age=timedelta(days=30), secure=True, httponly=True, samesite='Strict')

    return resp


@app.route('/clear-cookies', methods=['POST'])
def clear_cookies():
    """Route to clear cookies."""
    resp = make_response(jsonify({'message': 'Cookies cleared'}))
    resp.delete_cookie('cookie_accepted')
    resp.delete_cookie('analytics')
    resp.delete_cookie('personalization')
    return resp


if __name__ == '__main__':
    app.run(debug=True)
Explanation of the Code:
/ Route (Index Page):

This is the main route that checks the cookies when a user visits the page.
It checks if the user has accepted cookie_accepted, analytics, and personalization cookies.
Based on the cookies, it applies analytics tracking or personalization.
/set-cookie Route:

This route accepts the user's cookie preferences and sets the cookies accordingly.
It checks if the user has accepted essential, analytics, or personalization cookies through the POST data and then sets the corresponding cookies using resp.set_cookie().
The cookies are set with a 30-day expiry (max_age=timedelta(days=30)), secure=True for HTTPS, httponly=True for security, and samesite='Strict' for CSRF protection.
/clear-cookies Route:

This route clears the cookies by calling resp.delete_cookie() for each cookie.
Cookies and Their Usage:
Essential Cookies: These cookies are set when the user accepts the essential cookies for the website to function. It is typically non-negotiable and is required for basic functionality (like saving login sessions).

Analytics Cookies: These are used to track user behavior (e.g., page visits, clicks) for analytical purposes. If the user consents, the backend can include Google Analytics or other tracking code.

Personalization Cookies: These cookies store user preferences for personalization (e.g., theme color, preferred language, product recommendations). If accepted, you can display a personalized experience on the website.

Secure Cookies:
The cookies are set with the following attributes:

secure=True: Ensures that the cookie is only sent over HTTPS.
httponly=True: Restricts access to the cookie from JavaScript, helping to mitigate cross-site scripting (XSS) attacks.
samesite='Strict': Prevents cross-site request forgery (CSRF) attacks by restricting the cookie to first-party contexts only (i.e., the cookie is not sent with requests initiated by third-party websites).
