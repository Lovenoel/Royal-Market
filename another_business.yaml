The error occurs because MySQL does not allow TEXT or BLOB columns to be part of a key (e.g., UNIQUE or PRIMARY KEY) without explicitly specifying a length.

Fix
Modify the description column in your SQLAlchemy model to specify a maximum length using VARCHAR, or provide a key length for the TEXT column in the database schema. Here's how you can resolve it:

Option 1: Use VARCHAR
Change the description column type to db.String(length):

python
Copy code
description = db.Column(db.String(255), unique=True, nullable=False)
Option 2: Keep TEXT but Remove UNIQUE
If you need the column to remain TEXT, remove the unique=True constraint:

python
Copy code
description = db.Column(db.Text, nullable=False)
Option 3: Specify Key Length (Not Recommended for SQLAlchemy)
While directly specifying a key length is possible in raw SQL, SQLAlchemy does not support it out of the box. Using db.String is a more compatible solution.

After making these changes, re-run the migration or recreate the database schema. Let me know if you need further clarification!






