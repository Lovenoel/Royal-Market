Here's the code for handling file uploads with Flask, including both single and multiple file uploads, using the provided structure:

Flask Blueprint for File Uploads
python
Copy code
from flask import Blueprint, request, jsonify, current_app
from werkzeug.utils import secure_filename
import os
from app.utils import allowed_file

upload_bp = Blueprint('upload', __name__, url_prefix='/upload')

@upload_bp.route('/upload', methods=['POST'])
def upload_file():
    """Uploads a single file to the application's file system"""
    
    # Check if a file is part of the request
    if 'file' not in request.files:
        return jsonify({"message": "No file part"}), 400
    
    # Get the file from the request
    file = request.files['file']
    
    # Check if the file has no name
    if file.filename == '':
        return jsonify({"message": "No selected file"}), 400
    
    # Check if the file type is allowed
    if file and allowed_file(file.filename):
        # Secure the filename to prevent directory traversal attacks
        filename = secure_filename(file.filename)
        
        # Get the file path from the configured upload folder
        file_path = os.path.join(current_app.config['UPLOAD_FOLDER'], filename)
        
        # Save the file to the destination path
        file.save(file_path)
        
        # Return a success message with the file path
        return jsonify({"message": "File uploaded successfully", "file_path": file_path}), 200
    
    # If the file type is not allowed
    return jsonify({"message": "Invalid file type"}), 400


@upload_bp.route('/upload/multiple', methods=['POST'])
def upload_multiple_files():
    """Uploads multiple files to the application's file system"""
    
    # Check if files are part of the request
    if 'files' not in request.files:
        return jsonify({"message": "No file part"}), 400

    # Get the list of files
    files = request.files.getlist('files')
    
    file_paths = []
    
    # Iterate through each file in the list
    for file in files:
        # Check if the file type is allowed
        if file and allowed_file(file.filename):
            # Secure the filename
            filename = secure_filename(file.filename)
            
            # Get the file path
            file_path = os.path.join(current_app.config['UPLOAD_FOLDER'], filename)
            
            # Save the file to the destination path
            file.save(file_path)
            
            # Add the file path to the list
            file_paths.append(file_path)
    
    # Return success message with all the file paths
    return jsonify({"message": "Files uploaded successfully", "file_paths": file_paths}), 200
