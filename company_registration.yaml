Possible Cause
In SQLAlchemy, when defining a relationship, you must assign an instance of the related model, not just an ID. For example, if you have a User model with a foreign key to a Company model, you need to pass the Company object to the relationship, not the company_id.

Solution
Check where you’re creating the User or Company instance and ensure you’re not assigning an integer to a relationship attribute. Instead, assign the actual instance of the related model.

