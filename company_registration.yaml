    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

form label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

form input[type="text"],
form input[type="email"],
form input[type="password"],
form select,
form textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

form input[type="submit"],
form button {
    width: 100%;
    padding: 10px;
    font-size: 16px;
}

.form-group {
    margin-bottom: 15px;
}

.error {
    color: red;
    font-size: 0.9em;
    margin-top: -10px;
    margin-bottom: 10px;
}

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

table th, table td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: left;
}

table th {
    background-color: #333;
    color: #fff;
}

table tr:nth-child(even) {
    background-color: #f9f9f9;
}

table tr:hover {
    background-color: #f1f1f1;
}

/* Profile Page */
.profile-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.profile-container img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    margin-bottom: 15px;
}

/* Dashboard */
.dashboard-header {
    background-color: #5cb85c;
    color: #fff;
    padding: 15px;
    text-align: center;
    border-radius: 5px;
}

.dashboard-header h2 {
    margin: 0;
}

.dashboard-content {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    gap: 20px;
}

.dashboard-card {
    background-color: #fff;
    padding: 20px;
    width: calc(33.333% - 20px);
    border: 1px solid #ddd;
    border-radius: 5px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    text-align: center;
}

.dashboard-card h3 {
    margin-bottom: 10px;
}

.dashboard-card p {
    color: #666;
}

/* Notifications */
.notification {
    padding: 10px;
    background-color: #ffdd57;
    color: #333;
    border-radius: 5px;
    margin-bottom: 15px;
}

/* Responsive Design */
@media screen and (max-width: 768px) {
    .container {
        width: 90%;
    }

    .dashboard-content {
        flex-direction: column;
    }

    .dashboard-card {
        width: 100%;
    }
}
Explanation of Added Styles
General Reset: Ensures consistent box-sizing and removes default padding/margins.
Headers and Navigation: Styles for header and navigation links, making them consistent and accessible.
Form Styling: Provides a standardized form design, with styles for input fields, error messages, and buttons.
Table Styling: Adds styling for tables with alternating row colors and hover effects for readability.
Profile Page: Adds a container and styles for displaying profile images in a circular format.
Dashboard: Styles for the dashboard header and content cards, making it responsive for smaller screens.
Notifications: A simple notification style with background color for visibility.
Responsive Design: Ensures that the layout adapts well on smaller screens, particularly the dashboard and container width.
