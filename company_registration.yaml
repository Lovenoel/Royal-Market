from flask import flash, redirect, url_for, request
from werkzeug.security import check_password_hash
from .models import User, Company
from .forms import LoginForm, RegisterForm

@user_auth.route('/login', methods=['GET', 'POST'])
def login():
    form = LoginForm()
    if form.validate_on_submit():
        email = form.email.data
        password = form.password.data
        user = User.query.filter_by(email=email).first() or Company.query.filter_by(email=email).first()
        
        if user and check_password_hash(user.password, password):
            # Successful login
            login_user(user)
            flash('Login successful!', 'success')
            if user.is_admin:
                return redirect(url_for('user_auth.company_dashboard'))
            else:
                return redirect(url_for('user_auth.user_dashboard'))
        else:
            flash('Invalid email or password', 'danger')

    return render_template('login.html', form=form)

@user_auth.route('/register', methods=['GET', 'POST'])
def register():
    form = RegisterForm()
    if form.validate_on_submit():
        # Registration logic
        email = form.email.data
        # Check if email already exists in User or Company table
        if User.query.filter_by(email=email).first() or Company.query.filter_by(email=email).first():
            flash('Email already registered', 'danger')
            return redirect(url_for('user_auth.register'))
        
        # Create user or company based on form input
        flash('Registration successful!', 'success')
        return redirect(url_for('user_auth.login'))

    return render_template('register.html', form=form)
