The "reloading" behavior you're seeing with * Restarting with stat typically occurs because Flask's development server detects a file change in the project directory, triggering an automatic server reload. This is a feature of Flask’s development server when debug=True.

Here are some common reasons for this:

File Changes Detected: Flask monitors file changes and restarts the server if any changes are detected. This can sometimes be caused by:

Any file in the project directory, such as .py files, templates, or static files, being modified or saved.
IDEs or code editors creating temporary or autosave files that Flask mistakenly sees as changes.
Using a File Syncing Service: If you’re using a cloud storage syncing service (like Google Drive, Dropbox, or OneDrive) in your project directory, it might be updating timestamps on files, causing Flask to detect changes.

Temporary or Log Files: If there are files generated during runtime, such as logs or temporary files, Flask might detect these as changes. This could be a result of other processes writing to files in the same directory as the Flask app.

Configuration: If the app’s configuration file is modified, Flask might also trigger a reload.

Possible Solutions
Use .flaskenv or .env Files: Specify a .flaskenv or .env file to manage environment variables so you don't need to modify the config file directly. This reduces unnecessary file changes.

Run Without debug=True: If you're in production, you can disable debug mode to prevent automatic reloading.

Ignore Unnecessary Files: Ensure your .gitignore also includes any temporary or auto-generated files to prevent them from being saved or modified, which might reduce reloads.

Disable the Flask Stat Reloader: You can use the FLASK_RUN_EXTRA_FILES environment variable to limit the files Flask watches, or use a custom reloader in a production environment.






