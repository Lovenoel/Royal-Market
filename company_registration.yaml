/* Add any additional global styles here */
Step 2: Create a Base Template (base.html)
In your templates directory, create a base.html file. This template will include the link to the style.css file in the <head> section, ensuring that all templates inheriting from it apply the global styles.

base.html Template:

html
Copy code
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Flask App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>Welcome to Royalty Travel</h1>
    <nav>
        <a href="{{ url_for('home') }}">Home</a> |
        <a href="{{ url_for('register') }}">Register</a> |
        <a href="{{ url_for('login') }}">Login</a>
