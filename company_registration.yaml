<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    <p>&copy; 2024 Royalty Travel</p>
</footer>

</body>
</html>
The {% block title %} and {% block content %} tags allow child templates to set the page title and main content, respectively.
The url_for('static', filename='css/style.css') function dynamically links the CSS file.
Step 3: Extend the Base Template in Other Templates
For any other templates in your application, you can inherit from base.html to apply the global CSS and structure.

Example: home.html Template (extending base.html):

