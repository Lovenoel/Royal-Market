<!-- Add dashboard content here -->
{% endblock %}
Explanation of the Template Structure
Base Template (base.html):

Contains the link to style.css, so all templates inherit the styles.
Defines header and footer sections for consistency across pages.
Uses {% block %} tags to allow individual templates to specify custom titles and content.
Extended Templates (home.html, dashboard.html, etc.):

Use {% extends "base.html" %} to inherit the structure and styling from base.html.
Override {% block title %} and {% block content %} to provide page-specific content.
This approach ensures that all pages share a common structure and style, and updates to style.css or base.html are reflected across all templates.






