The log output shows that your Flask application is running and serving multiple CSS files and handling various routes. However, there is a warning related to SQLAlchemy in your code:

SQLAlchemy Warning Explanation
The warning message suggests there is a conflict with the relationship configuration in your models:

plaintext
Copy code
SAWarning: relationship 'User.company' will copy column company.id to column user.company_id, which conflicts with relationship(s): 
'User.companys' (copies company.id to user.company_id).
This occurs when there are two or more relationships in your model that refer to the same foreign key column without distinguishing them properly. SQLAlchemy is prompting you to either:

Use back_populates to explicitly link the relationships.
Set one of the relationships as viewonly=True if it is not meant for data modification.
Use the overlaps parameter to specify that these relationships are expected to overlap on the same foreign key column.
Solution Options
Depending on your use case, you can take one of the following actions:

Use back_populates to link relationships explicitly if both relationships are meant to connect and interact with the same entities. For example:

python
Copy code
class User(db.Model):
    id = db.Column(db.Integer, primary_key=True)
    company_id = db.Column(db.Integer, db.ForeignKey('company.id'))
    company = db.relationship('Company', back_populates='users')

class Company(db.Model):
    id = db.Column(db.Integer, primary_key=True)
    users = db.relationship('User', back_populates='company')
Set viewonly=True on one of the relationships if it is intended to be read-only:

python
Copy code
companys = db.relationship('Company', viewonly=True)
Use overlaps if the relationships are intentionally overlapping and need to share the same foreign key. Add overlaps="companys" to one of the relationships:

python
Copy code
company = db.relationship('Company', overlaps="companys")
The appropriate fix depends on the intended behavior of your User and Company relationships.






