To apply standard CSS across all HTML files in your Flask application, you’ll want to define a base template and then include a global CSS file in it. Here’s how you can achieve that, along with an explanation of each step.

Steps
Create a Base Template: This template will serve as a foundation for all other HTML templates, ensuring that they inherit common elements like the CSS link, header, and footer.
Link a Global CSS File: Add a CSS file (e.g., style.css) to the static folder, which will contain all global styling.
Extend the Base Template: Use Jinja2 template inheritance to apply the base template to other templates, ensuring consistent styling.
Step 1: Create a Global CSS File
Add a style.css file in the static directory. This file will hold all the common CSS styles that should be applied throughout the application.

Directory Structure:

bash
Copy code
/static
    /css
        style.css  # Global CSS file
/templates
    base.html      # Base template
    other_templates...
Example Content for style.css:

